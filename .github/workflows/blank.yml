name: Actualizar Feed XML de Pinterest

on:
  schedule:
    # Se ejecuta todos los días a las 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: 
    # Permite ejecutarlo manualmente desde la pestaña "Actions" en GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Da permisos de escritura para que el bot pueda guardar el archivo XML
    permissions:
      contents: write

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Ejecutar script generador
        env:
          # Aquí llamamos a la clave secreta que configuraremos en el siguiente paso
          FOURTHWALL_API_KEY: ${{ secrets.FOURTHWALL_API_KEY }}
        run: python feed.py

      - name: Hacer Commit y Push del nuevo XML
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add pinterest_feed.xml
          
          # Si no hay cambios en los productos, el commit fallará de forma segura sin romper el action
          git commit -m "Automated: Actualizado pinterest_feed.xml" || echo "Sin cambios para commitear"
          git push
